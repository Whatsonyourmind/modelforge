      - { id: A-043, name: leverage_threshold_y4, label: { en: "Lev Y4", it: "Leva Y4" }, unit: x, base: 4.50, rationale: "Step.", confidence: H }
      - { id: A-044, name: leverage_threshold_y5, label: { en: "Lev Y5", it: "Leva Y5" }, unit: x, base: 4.25, rationale: "Step.", confidence: H }
      - { id: A-045, name: leverage_threshold_y6, label: { en: "Lev Y6", it: "Leva Y6" }, unit: x, base: 4.00, rationale: "Step.", confidence: H }
