  stress_ebitda_multiple: { id: A-101, name: stress_ebitda_multiple, label: { en: "Stress exit multiple", it: "Multiplo stress" }, unit: x, base: 5.0, rationale: "Distressed specialty pharma exit multiple.", confidence: M, source_id: S-003 }
  recovery_timeline_years: { id: A-102, name: recovery_timeline_years, label: { en: "Recovery years", it: "Anni di recupero" }, unit: years, base: 2.0, rationale: "Italian insolvency procedure median 18-24 months.", confidence: M }
  liquidation_discount_pct: { id: A-103, name: liquidation_discount_pct, label: { en: "Liquidation discount", it: "Sconto liquidazione" }, unit: pct, base: 0.15, rationale: "15% haircut on EV in forced sale per AIFI benchmark.", confidence: M, source_id: S-002 }

rating:
  internal_rating: BB
  moodys_equivalent: Ba2
  sp_equivalent: BB
  probability_of_default_pct: { id: A-110, name: probability_of_default_pct, label: { en: "PD (life)", it: "PD (vita)" }, unit: pct, base: 0.10, rationale: "ECB Italian SME Pharma PD 10-12% over 6y instrument life.", confidence: M, source_id: S-004 }

credit_strengths:
  - "Italy #1 European producer of Specialty Pharma/CDMO — sector named 'gold' by BlackRock (DD Talks 2026)"
  - "3-year historical revenue CAGR 7% with stable EBITDA margin 20-22%"
  - "Contracted revenue book covers ~70% of Y1 projected revenue"
  - "Asset-light on IP side with defensible regulatory approvals"
  - "AIFMD II regulatory tailwind driving pharma CDMO consolidation 2026+"

credit_weaknesses:
  - "Customer concentration: top 3 customers = 45% revenue"
  - "EUR funding cost volatility — EURIBOR 6M scenario band ±80 bps"
  - "Capex intensity (6-8% total) compresses FCF headroom to unitranche"
  - "Working capital build (12% of Δrevenue) consumes growth FCF"

mitigating_factors:
  - "Leverage covenant steps down 25 bps/year through maturity (Year 7 target 4.0x from 5.25x)"
  - "Cash sweep activates at 3.5x leverage (LMA standard 50% of excess FCF)"
  - "Equity cure permitted once per year, twice per life"
  - "Make-whole protection inside 2y call window"
  - "Senior-secured with security package over receivables + IP"

historical_revenue_eur_m: [35.0, 38.2, 42.0]
historical_ebitda_eur_m:  [7.0, 8.2, 9.2]
historical_net_debt_eur_m: 4.5
historical_net_debt_source_id: S-001

