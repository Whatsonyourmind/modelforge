      - { id: A-053, name: icr_threshold_y4, label: { en: "ICR Y4", it: "ICR Y4" }, unit: x, base: 2.00, rationale: "Hold.", confidence: H }
      - { id: A-054, name: icr_threshold_y5, label: { en: "ICR Y5", it: "ICR Y5" }, unit: x, base: 2.00, rationale: "Hold.", confidence: H }
      - { id: A-055, name: icr_threshold_y6, label: { en: "ICR Y6", it: "ICR Y6" }, unit: x, base: 2.00, rationale: "Hold.", confidence: H }
