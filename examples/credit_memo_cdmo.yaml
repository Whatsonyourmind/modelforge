debt:
  tranches:
    - name: { en: "Senior Unitranche", it: "Unitranche Senior" }
      seniority: senior
      tenor_years: 6
      amortization: bullet
      reference_rate:
        name: EURIBOR_6M
        rate_decimal: { id: A-030, name: euribor_6m_rate, label: { en: "EURIBOR 6M", it: "EURIBOR 6M" }, unit: pct, base: 0.028, worst: 0.036, best: 0.022, rationale: "ECB April 2026.", confidence: H, source_id: S-009 }
      amount: { id: A-031, name: senior_unitranche_amount, label: { en: "Senior amount", it: "Senior importo" }, unit: eur_m, base: 38.0, rationale: "4.1x EBITDA.", confidence: H, source_id: S-007 }
      margin_bps: { id: A-032, name: senior_unitranche_margin_bps, label: { en: "Senior margin (bps)", it: "Senior margine" }, unit: bps, base: 625, worst: 675, best: 575, rationale: "PEM Q1 2026.", confidence: H, source_id: S-007 }
      floor_pct: { id: A-033, name: senior_unitranche_floor, label: { en: "EURIBOR floor", it: "Floor" }, unit: pct, base: 0.0, rationale: "No floor.", confidence: H }
      arrangement_fee_pct: { id: A-034, name: senior_unitranche_arrangement_fee, label: { en: "Arrangement %", it: "Strutturazione %" }, unit: pct, base: 0.03, rationale: "AIFI.", confidence: H }
      commitment_fee_bps: { id: A-035, name: senior_unitranche_commitment_fee, label: { en: "Commitment (bps)", it: "Commitment (bps)" }, unit: bps, base: 0, rationale: "Fully drawn.", confidence: H }
      oid_pct: { id: A-036, name: senior_unitranche_oid, label: { en: "OID", it: "OID" }, unit: pct, base: 0.0, rationale: "No OID.", confidence: H }
  cash_sweep:
    enabled: true
    sweep_pct: { id: A-080, name: cash_sweep_pct, label: { en: "Cash sweep %", it: "Cash sweep %" }, unit: pct, base: 0.50, rationale: "LMA 50%.", confidence: H, source_id: S-005 }
    trigger_leverage: { id: A-081, name: cash_sweep_trigger, label: { en: "Sweep trigger", it: "Soglia sweep" }, unit: x, base: 3.50, rationale: "Standard.", confidence: H, source_id: S-005 }

