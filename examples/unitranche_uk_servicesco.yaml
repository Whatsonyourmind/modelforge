          source_id: S-004
      amount:
        id: A-031
        name: senior_unitranche_amount
        label: { en: "Senior Unitranche amount", it: "Unitranche Senior importo" }
        unit: eur_m
        base: 38.0
        worst: 38.0
        best: 38.0
        rationale: "Commitment sized at ~4.1x FY25 EBITDA, within UK MM unitranche norms (3.5-5.0x leverage)."
        confidence: H
        source_id: S-005
      margin_bps:
        id: A-032
        name: senior_unitranche_margin_bps
        label: { en: "Senior Unitranche margin (bps)", it: "Unitranche Senior margine (bps)" }
        unit: bps
        base: 625
        worst: 675
        best: 575
