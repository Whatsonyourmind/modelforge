          name: euribor_6m_rate
          label: { en: "SONIA (reference)", it: "SONIA (riferimento)" }
          unit: pct
          base: 0.0280
          worst: 0.0360
          best: 0.0220
          rationale: "BoE SONIA fixing 10-Apr-2026. Worst = +80 bps stress, Best = -60 bps."
