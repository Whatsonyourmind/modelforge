      - { id: A-051, name: icr_threshold_y2, label: { en: "ICR threshold Y2", it: "Soglia ICR Y2" }, unit: x, base: 1.85, rationale: "Step up 10 bps.", confidence: H, source_id: S-009 }
      - { id: A-052, name: icr_threshold_y3, label: { en: "ICR threshold Y3", it: "Soglia ICR Y3" }, unit: x, base: 2.00, rationale: "Step up 15 bps.", confidence: H, source_id: S-009 }
      - { id: A-053, name: icr_threshold_y4, label: { en: "ICR threshold Y4", it: "Soglia ICR Y4" }, unit: x, base: 2.00, rationale: "Hold.", confidence: H, source_id: S-009 }
      - { id: A-054, name: icr_threshold_y5, label: { en: "ICR threshold Y5", it: "Soglia ICR Y5" }, unit: x, base: 2.00, rationale: "Hold.", confidence: H, source_id: S-009 }
      - { id: A-055, name: icr_threshold_y6, label: { en: "ICR threshold Y6", it: "Soglia ICR Y6" }, unit: x, base: 2.00, rationale: "Hold.", confidence: H, source_id: S-009 }
