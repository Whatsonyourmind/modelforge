      en: Total Net Leverage
      it: Leva Finanziaria Netta Totale
    kind: leverage
    test_frequency: quarterly
    equity_cure: true
    cure_limit_per_year: 1
    cure_limit_total: 2
    threshold_by_year:
      - { id: A-040, name: leverage_threshold_y1, label: { en: "Leverage threshold Y1", it: "Soglia leva Y1" }, unit: x, base: 5.25, rationale: "LMA standard opening + 0.5x headroom.", confidence: H, source_id: S-009 }
      - { id: A-041, name: leverage_threshold_y2, label: { en: "Leverage threshold Y2", it: "Soglia leva Y2" }, unit: x, base: 5.00, rationale: "Step down 25 bps.", confidence: H, source_id: S-009 }
      - { id: A-042, name: leverage_threshold_y3, label: { en: "Leverage threshold Y3", it: "Soglia leva Y3" }, unit: x, base: 4.75, rationale: "Step down 25 bps.", confidence: H, source_id: S-009 }
      - { id: A-043, name: leverage_threshold_y4, label: { en: "Leverage threshold Y4", it: "Soglia leva Y4" }, unit: x, base: 4.50, rationale: "Step down 25 bps.", confidence: H, source_id: S-009 }
      - { id: A-044, name: leverage_threshold_y5, label: { en: "Leverage threshold Y5", it: "Soglia leva Y5" }, unit: x, base: 4.25, rationale: "Step down 25 bps.", confidence: H, source_id: S-009 }
      - { id: A-045, name: leverage_threshold_y6, label: { en: "Leverage threshold Y6", it: "Soglia leva Y6" }, unit: x, base: 4.00, rationale: "Step down 25 bps.", confidence: H, source_id: S-009 }
      - { id: A-046, name: leverage_threshold_y7, label: { en: "Leverage threshold Y7", it: "Soglia leva Y7" }, unit: x, base: 4.00, rationale: "Hold at 4.00x through maturity.", confidence: H, source_id: S-009 }
  - name:
      en: Interest Coverage Ratio
      it: Rapporto di Copertura Interessi
    kind: icr
    test_frequency: quarterly
    equity_cure: true
    threshold_by_year:
