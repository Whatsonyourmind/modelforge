opening_bs:
  # Assets:  net loans (13,790) + securities 3,500 + cash 1,500 + intangibles 300 + other 200 = 19,290
  gross_loans_eur_m: 14000.0
  allowance_eur_m:   -210.0        # contra-asset (≤ 0); ~1.5% coverage
  securities_eur_m:   3500.0
  cash_eur_m:         1500.0
  intangibles_eur_m:   300.0
  other_assets_eur_m:  200.0
  # L & E:  deposits 14,500 + wholesale 2,435 + other_liab 390 + common equity (1,665) + at1 300 = 19,290
  deposits_eur_m:        14500.0
  wholesale_funding_eur_m: 2435.0
  other_liabilities_eur_m:  390.0
  cet1_eur_m:             1365.0    # opening CET1; common equity = cet1 + intangibles = 1,665
  at1_eur_m:               300.0
  # tie: assets 14000-210+3500+1500+300+200 = 19,290 ; L&E 14500+2435+390+(1365+300)+300 = 19,290 ✓
  # opening CET1 ratio = 1365 / (0.52 × (14000+3500) = 9100) = 15.0% (> 13.5% target, > 9.0% requirement)

cet1_regulatory_adjustments_eur_m: 0.0   # CRR Art.26-36 proxy; plug a COREP number here

