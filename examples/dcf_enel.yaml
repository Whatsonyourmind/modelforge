lease_liability_ifrs16_assum:
  id: A-508
  name: lease_liability_ifrs16_assum
  label: {en: IFRS 16 lease liability (€m), it: Passività leasing IFRS 16 (€m)}
  unit: eur_m
  base: 4800.0
  worst: 4800.0
  best: 4800.0
  rationale: IFRS 16 right-of-use lease liability — subtracted from EV because EBITDA is post-IFRS 16 (includes ROU amortization in D&A)
  confidence: H
  source_id: S-001

# Mid-year convention (Macabacus default for non-seasonal names).
mid_year_convention: true

# v0.7: stub-period if valuation date falls mid-fiscal-year.
# 365 = full year (default). Set to e.g. 230 if valuing in May mid-year.
stub_period_days: 365

# v0.7: two-stage fade period (0 = no fade, single-stage).
fade_years: 0

horizon:
  historical_years: 3
  projection_years: 5

