# v0.6: wrap bridge quantities as Assumptions so the Valuation sheet
# references named ranges with source attribution instead of hardcoded
# literals. The bare-scalar fields above are retained for backwards
# compatibility but the builder now prefers these.
net_debt_assum:
  id: A-501
  name: net_debt_assum
  label: {en: Net debt (€m), it: Posizione finanziaria netta (€m)}
  unit: eur_m
  base: 60000.0
  worst: 60000.0
  best: 60000.0
  rationale: FY25 reported net financial debt — Enel IR p.12
  confidence: H
  source_id: S-001

shares_outstanding_assum:
  id: A-502
  name: shares_outstanding_assum
  label: {en: Shares outstanding (m), it: Azioni in circolazione (m)}
  unit: x
  base: 10166.0
  worst: 10166.0
  best: 10166.0
  rationale: Diluted share count as reported in FY25 filings
  confidence: H
  source_id: S-001

current_price_assum:
  id: A-503
  name: current_price_assum
  label: {en: Current share price (€), it: Prezzo corrente (€)}
  unit: eur
  base: 6.45
  worst: 6.45
  best: 6.45
  rationale: Closing price on valuation date (15-Apr-2026)
  confidence: H
  source_id: S-003

# v0.7: full EV→Equity bridge (Footnotes Analyst standard for fairness
# opinions). Enel has material minorities (Enel Americas, Endesa stakes),
# pension deficit, no preferred, and IFRS 16 lease liability from network
# concessions.
minority_interest_assum:
  id: A-504
  name: minority_interest_assum
  label: {en: Minority interest (€m), it: Interessenze di minoranza (€m)}
  unit: eur_m
  base: 14000.0
  worst: 14000.0
  best: 14000.0
  rationale: "Enel FY25 NCI from Enel Americas (35.5% float) + Endesa minority — from FY25 consolidated BS"
  confidence: H
  source_id: S-001

pension_deficit_assum:
  id: A-505
  name: pension_deficit_assum
  label: {en: Pension deficit — unfunded (€m), it: Deficit pensionistico (€m)}
  unit: eur_m
  base: 1800.0
  worst: 2200.0
  best: 1500.0
  rationale: Defined-benefit plan unfunded portion per IAS 19 disclosures
  confidence: M
  source_id: S-001

preferred_equity_assum:
  id: A-506
  name: preferred_equity_assum
  label: {en: Preferred equity (€m), it: Azioni privilegiate (€m)}
  unit: eur_m
  base: 0.0
  worst: 0.0
  best: 0.0
  rationale: Enel has no preferred stock outstanding
  confidence: H
  source_id: S-001

cross_holdings_assum:
  id: A-507
  name: cross_holdings_assum
  label: {en: Cross-holdings / investments at FV (€m), it: Partecipazioni (€m)}
  unit: eur_m
  base: 2500.0
  worst: 2000.0
  best: 3000.0
  rationale: Associates and JVs accounted for at equity method — mark-to-market adjustment
  confidence: M
