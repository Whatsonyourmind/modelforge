  coupon:
    kind: fixed
    fixed_rate:
      { id: A-031, name: fixed_coupon, label: { en: "Fixed coupon", it: "Cedola fissa" }, unit: pct, base: 0.065, worst: 0.075, best: 0.058, rationale: "2026 unsecured minibond benchmark 6-7%; Codess 3.85% was pre-hike. Senior secured + ICM precedent support ~6.5%.", confidence: H, source_id: S-002 }
  amortization: linear_from_year
  amortization_start_year: 3
  call_protection_years: 3
  make_whole_pct:
    { id: A-032, name: make_whole_pct, label: { en: "Make-whole premium", it: "Make-whole" }, unit: pct, base: 0.02, rationale: "2% par premium inside call protection.", confidence: M }
  arrangement_fee_pct:
    { id: A-033, name: arrangement_fee_pct, label: { en: "Arrangement fee %", it: "Commissione strutturazione %" }, unit: pct, base: 0.015, rationale: "Italian minibond arrangement 1-2% (market norm).", confidence: H, source_id: S-002 }
  legal_fees_eur_m:
    { id: A-034, name: legal_fees, label: { en: "Legal fees (€m)", it: "Spese legali" }, unit: eur_m, base: 0.10, rationale: "Standard €100-150k for €20M issuance.", confidence: H }
  listing_fees_eur_m:
