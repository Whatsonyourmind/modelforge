bond:
  notional:
    { id: A-030, name: bond_notional, label: { en: "Notional", it: "Nominale" }, unit: eur_m, base: 20.0, rationale: "In line with ICM precedent (€25M); €20M size for conservative leverage.", confidence: H, source_id: S-003 }
