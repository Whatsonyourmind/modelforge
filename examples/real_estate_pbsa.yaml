  - { id: S-002, doc: Italian_PBSA_market_report_2026.pdf, page: 22, publisher: "Italian RE SGR", date: 2026-02-28, verified: true, note: "Italian PBSA market — rent growth 4-5% y/y, occupancy 95%+ in Milan/Rome." }
  - { id: S-003, doc: CBRE_Italy_Living_Cap_Rate_Survey_Q1_2026.pdf, page: 12, publisher: CBRE, date: 2026-04-10, verified: true, note: "Italian prime PBSA cap rates 4.50-4.75% Q1 2026." }
  - { id: S-004, doc: PwC_Italy_Senior_RE_Debt_Pricing_Q1_2026.pdf, page: 15, publisher: PwC, date: 2026-03-20, verified: false, note: "Italian RE senior debt 5.5-6.25% all-in, 55-60% LTV." }
  - { id: S-005, doc: Deloitte_European_RE_Transaction_Costs.pdf, page: 6, publisher: Deloitte, date: 2025-12-01, verified: true, note: "Italian RE transaction costs 2.5-3.0% (imposta di registro + notaio + broker)." }
  - { id: S-006, doc: ISTAT_CPI_Italy_Rent_Index_2026.html, page: 1, publisher: ISTAT, date: 2026-04-05, url: "https://www.istat.it/", verified: true, note: "Italian rent index 2026 +2.5% y/y." }

property:
