# ─────────────────────────────────────────────────────────────────────────
# FULLY SYNTHETIC EXAMPLE — Ground-up PBSA development (development_re template)
#
# Northgate Student Living — a 350-bed purpose-built student accommodation
# development in the generic city of "Brookfield". Every figure below is an
# ILLUSTRATIVE, INVENTED placeholder for a synthetic teaching example. No real
# deal, sponsor, asset, institution, or jurisdiction-specific programme is
# referenced. The "public development grant" is a generic regeneration grant,
# not any named programme.
#
# Economics: ~£41m total development cost (~£118k/bed), 60% loan-to-cost senior
# debt, 18-month construction, 12-month lease-up, 5-year hold, 5.25% exit cap
# rate, European whole-fund LP/GP promote (8% pref → catch-up → 80/20 residual).
# The deal is tuned to a defensible ground-up development spread: yield-on-cost
# ~6.5% vs an exit cap ~5.25%, which produces a genuine development margin —
# unlevered project IRR in the low teens (~11.8%) and POSITIVE leverage from the
# 60% LTC senior facility (levered equity IRR ~17.5%, materially above the
# unlevered project IRR). Construction interest CAPITALISES into the senior
# balance during the build (IDC), and the full facility is repaid at exit.
# ─────────────────────────────────────────────────────────────────────────

