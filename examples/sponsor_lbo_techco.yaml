# ─────────────────────────────────────────────────────────────────────────────
# ModelForge example: Sponsor LBO for Italian Specialty Pharma CDMO (v0.8)
#
# Same target as unitranche_cdmo (CDMO SpA) but modeled from the SPONSOR's
# buy-side perspective: full S&U, purchase price build, PPA, exit scenarios,
# hurdle, GP promote. Built on UnitrancheSpec structure plus sponsor-specific
# additions defined in modelforge/spec/sponsor_lbo.py.
# ─────────────────────────────────────────────────────────────────────────────

model_type: sponsor_lbo

meta:
  project_code: DEMO-LBO-CDMO-01
  deliverable:
    en: Sponsor LBO Model — CDMO Acquisition
    it: Modello LBO Sponsor — Acquisizione CDMO
  analyst: Analyst
  version: v0.1
  status: draft
  valuation_date: 2026-04-15
  currency: EUR
  unit_scale: millions
  sign_convention: costs_negative
  revision_log:
    - version: v0.1
      date: 2026-04-15
      analyst: LS
      note: Initial draft — base case only. Scenarios to follow.

target:
  name: "Target SpA (anonymized)"
  sector:
    en: Specialty Pharma / CDMO
    it: Pharma specialistico / CDMO
  country: IT
  currency: EUR
  revenue_last_fy_eur_m: 42.0
  revenue_source_id: S-001
  ebitda_last_fy_eur_m: 9.2
  ebitda_source_id: S-001
  last_fy_end: 2025-12-31

horizon:
  historical_years: 3
  projection_years: 7

