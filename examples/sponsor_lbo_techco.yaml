# DEBT STRUCTURE
# ─────────────────────────────────────────────────────────────────────────────
debt:
  tranches:
    - name:
        en: Senior Unitranche
        it: Unitranche Senior
      seniority: senior
      tenor_years: 6
      amortization: bullet
      reference_rate:
        name: EURIBOR_6M
        rate_decimal:
          id: A-030
          name: euribor_6m_rate
          label: { en: "EURIBOR 6M (reference)", it: "EURIBOR 6M (riferimento)" }
          unit: pct
          base: 0.0280
          worst: 0.0360
          best: 0.0220
          rationale: "ECB SDW fixing 10-Apr-2026. Worst = +80 bps stress, Best = -60 bps."
          confidence: H
          source_id: S-004
      amount:
        id: A-031
        name: senior_unitranche_amount
        label: { en: "Senior Unitranche amount", it: "Unitranche Senior importo" }
        unit: eur_m
        base: 38.0
        worst: 38.0
        best: 38.0
        rationale: "Commitment sized at ~4.1x FY25 EBITDA, within Italian mid-market unitranche norms (3.5-4.5x)."
        confidence: H
        source_id: S-005
      margin_bps:
        id: A-032
        name: senior_unitranche_margin_bps
        label: { en: "Senior Unitranche margin (bps)", it: "Unitranche Senior margine (bps)" }
        unit: bps
        base: 625
        worst: 675
        best: 575
        rationale: "PEM Q1 2026 survey median 625 bps for Italian mid-market Pharma unitranche."
        confidence: H
        source_id: S-005
      floor_pct:
        id: A-033
        name: senior_unitranche_floor
        label: { en: "EURIBOR floor", it: "EURIBOR floor" }
        unit: pct
        base: 0.0
        rationale: "No floor — standard for 2026 vintage unitranche in IT given positive rates."
        confidence: H
      arrangement_fee_pct:
        id: A-034
        name: senior_unitranche_arrangement_fee
        label: { en: "Arrangement fee %", it: "Commissione strutturazione %" }
        unit: pct
        base: 0.03
        worst: 0.025
        best: 0.035
        rationale: "AIFI benchmark 2.5-3.5%. Midpoint."
        confidence: H
        source_id: S-006
      commitment_fee_bps:
        id: A-035
        name: senior_unitranche_commitment_fee
        label: { en: "Commitment fee (bps)", it: "Commitment fee (bps)" }
        unit: bps
        base: 0
        rationale: "Fully drawn at close — no commitment fee."
        confidence: H
      oid_pct:
        id: A-036
        name: senior_unitranche_oid
        label: { en: "OID %", it: "OID %" }
        unit: pct
        base: 0.0
        rationale: "No OID structured."
        confidence: H
  rcf:
    enabled: false
  cash_sweep:
    enabled: true
    sweep_pct:
      id: A-080
      name: cash_sweep_pct
      label: { en: "Cash sweep % of excess FCF", it: "Cash sweep % FCF in eccesso" }
      unit: pct
      base: 0.50
      worst: 0.75
      best: 0.25
      rationale: "LMA-standard Italian unitranche: 50% sweep above trigger. Worst tightens to 75%, best loosens to 25%."
      confidence: H
      source_id: S-009
    trigger_leverage:
      id: A-081
      name: cash_sweep_trigger
      label: { en: "Cash sweep leverage trigger", it: "Soglia leva per cash sweep" }
      unit: x
      base: 3.50
      worst: 3.00
      best: 4.00
      rationale: "Sweep activates when leverage > 3.5x. Standard in IT mid-market unitranche."
      confidence: H
      source_id: S-009

# ─────────────────────────────────────────────────────────────────────────────
# COVENANTS
# ─────────────────────────────────────────────────────────────────────────────
covenants:
  - name:
      en: Total Gross Leverage
      it: Leva Finanziaria Lorda Totale
    kind: leverage
    test_frequency: quarterly
    equity_cure: true
    cure_limit_per_year: 1
    cure_limit_total: 2
    threshold_by_year:
      - { id: A-040, name: leverage_threshold_y1, label: { en: "Leverage threshold Y1", it: "Soglia leva Y1" }, unit: x, base: 5.25, rationale: "LMA standard opening + 0.5x headroom.", confidence: H, source_id: S-009 }
      - { id: A-041, name: leverage_threshold_y2, label: { en: "Leverage threshold Y2", it: "Soglia leva Y2" }, unit: x, base: 5.00, rationale: "Step down 25 bps.", confidence: H, source_id: S-009 }
      - { id: A-042, name: leverage_threshold_y3, label: { en: "Leverage threshold Y3", it: "Soglia leva Y3" }, unit: x, base: 4.75, rationale: "Step down 25 bps.", confidence: H, source_id: S-009 }
      - { id: A-043, name: leverage_threshold_y4, label: { en: "Leverage threshold Y4", it: "Soglia leva Y4" }, unit: x, base: 4.50, rationale: "Step down 25 bps.", confidence: H, source_id: S-009 }
      - { id: A-044, name: leverage_threshold_y5, label: { en: "Leverage threshold Y5", it: "Soglia leva Y5" }, unit: x, base: 4.25, rationale: "Step down 25 bps.", confidence: H, source_id: S-009 }
      - { id: A-045, name: leverage_threshold_y6, label: { en: "Leverage threshold Y6", it: "Soglia leva Y6" }, unit: x, base: 4.00, rationale: "Step down 25 bps.", confidence: H, source_id: S-009 }
      - { id: A-046, name: leverage_threshold_y7, label: { en: "Leverage threshold Y7", it: "Soglia leva Y7" }, unit: x, base: 4.00, rationale: "Hold at 4.00x through maturity.", confidence: H, source_id: S-009 }
  - name:
      en: Interest Coverage Ratio
      it: Rapporto di Copertura Interessi
    kind: icr
    test_frequency: quarterly
    equity_cure: true
    threshold_by_year:
      - { id: A-050, name: icr_threshold_y1, label: { en: "ICR threshold Y1", it: "Soglia ICR Y1" }, unit: x, base: 1.75, rationale: "LMA standard opening.", confidence: H, source_id: S-009 }
      - { id: A-051, name: icr_threshold_y2, label: { en: "ICR threshold Y2", it: "Soglia ICR Y2" }, unit: x, base: 1.85, rationale: "Step up 10 bps.", confidence: H, source_id: S-009 }
      - { id: A-052, name: icr_threshold_y3, label: { en: "ICR threshold Y3", it: "Soglia ICR Y3" }, unit: x, base: 2.00, rationale: "Step up 15 bps.", confidence: H, source_id: S-009 }
      - { id: A-053, name: icr_threshold_y4, label: { en: "ICR threshold Y4", it: "Soglia ICR Y4" }, unit: x, base: 2.00, rationale: "Hold.", confidence: H, source_id: S-009 }
      - { id: A-054, name: icr_threshold_y5, label: { en: "ICR threshold Y5", it: "Soglia ICR Y5" }, unit: x, base: 2.00, rationale: "Hold.", confidence: H, source_id: S-009 }
      - { id: A-055, name: icr_threshold_y6, label: { en: "ICR threshold Y6", it: "Soglia ICR Y6" }, unit: x, base: 2.00, rationale: "Hold.", confidence: H, source_id: S-009 }
      - { id: A-056, name: icr_threshold_y7, label: { en: "ICR threshold Y7", it: "Soglia ICR Y7" }, unit: x, base: 2.00, rationale: "Hold through maturity.", confidence: H, source_id: S-009 }

