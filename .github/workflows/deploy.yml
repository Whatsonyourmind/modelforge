name: Deploy

# Auto-deploy SaaS shell on push to master.
#
# Two parallel deploy targets:
#   1. Render web service (FastAPI app at modelforge.web.app:app)
#   2. Cloudflare Worker (Yjs realtime collab)
#
# Both jobs FAIL-CLOSED when their secrets are missing — they print a
# friendly skip message and exit 0. This lets the workflow run cleanly
# pre-launch, and starts deploying automatically the moment the user
# adds the secrets.
#
# Required GitHub secrets (all optional — each unblocks one target):
#   RENDER_DEPLOY_HOOK_URL      Render: Settings → Deploy Hook → URL
#   CLOUDFLARE_API_TOKEN        CF Dashboard → My Profile → API Tokens (Edit Workers)
#   CLOUDFLARE_ACCOUNT_ID       CF Dashboard → Workers → Overview → Account ID
#   SUPABASE_JWT_SECRET         Supabase: Settings → API → JWT Secret (only used by Worker)
#
# See DEPLOY_NOW.md for the 30-min user-side playbook.

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      target:
        description: "Which target to deploy"
        required: false
        default: "all"
        type: choice
        options: [all, render, cf-worker]

permissions:
  contents: read

jobs:
  deploy-render:
    name: Deploy Render web service
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'render' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "::notice::RENDER_DEPLOY_HOOK_URL not set — skipping Render deploy."
            echo "To enable: create a Render service from deploy/render.yaml,"
            echo "then add the deploy-hook URL as a GitHub secret."
            exit 0
          fi
          echo "Triggering Render deploy hook..."
          response=$(curl -fsS -X POST "$DEPLOY_HOOK_URL")
          echo "Render response: $response"
          echo "::notice::Render deploy triggered. Track at https://dashboard.render.com/"

  deploy-cf-worker:
    name: Deploy Cloudflare Worker (Yjs collab)
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'cf-worker' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/collab-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip when CF secret missing
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping Worker deploy."
          echo "To enable: get an API token at https://dash.cloudflare.com/profile/api-tokens"
          echo "(use the 'Edit Cloudflare Workers' template), then add as a GitHub secret."
          echo "skip=true" >> "$GITHUB_OUTPUT"
        id: skip_check

      - name: Setup Node
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        uses: actions/setup-node@v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/collab-worker/package-lock.json

      - name: Install Worker deps
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm ci || npm install

      - name: Push secrets to Worker
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.SUPABASE_JWT_SECRET != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
        run: |
          echo "$SUPABASE_JWT_SECRET" | npx wrangler secret put SUPABASE_JWT_SECRET

      - name: Deploy Worker
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy
          echo "::notice::Cloudflare Worker deployed. URL printed in wrangler output above."
