name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # manual trigger via GitHub UI

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/modelforge-finance
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No password needed — OIDC trusted publishing.
          # PyPI verifies the GitHub Actions run via OpenID Connect.
          # One-time setup required on PyPI: https://pypi.org/manage/account/publishing/
          packages-dir: dist/
          skip-existing: true

  github-release:
    name: Attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to create the release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Generate SBOM
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python scripts/generate_sbom.py --out sbom.cdx.json
          echo "SBOM: $(wc -l < sbom.cdx.json) lines"

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            sbom.cdx.json
