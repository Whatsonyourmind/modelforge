name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # manual trigger via GitHub UI

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: Compute base64 SHA-256 hashes for SLSA provenance
        id: hash
        working-directory: dist
        run: |
          # SLSA generator expects a base64-encoded multi-hash file.
          echo "hashes=$(sha256sum * | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  # SLSA L3 build provenance — generated by the official SLSA Generator
  # (runs in a separate, isolated job per SLSA requirements). Produces an
  # in-toto attestation of the built artifacts that anyone can verify with
  # `slsa-verifier verify-artifact`.
  provenance:
    name: SLSA L3 provenance
    needs: [build]
    permissions:
      actions: read       # reads workflow run details
      id-token: write     # required for Sigstore OIDC keyless signing
      contents: write     # required to attach provenance to release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      provenance-name: modelforge-finance.intoto.jsonl
      upload-assets: true   # attach .intoto.jsonl to GitHub release

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/modelforge-finance
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI (with PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No password needed — OIDC trusted publishing.
          # PyPI verifies the GitHub Actions run via OpenID Connect.
          # One-time setup required on PyPI: https://pypi.org/manage/account/publishing/
          # `attestations: true` produces Sigstore-signed PEP 740 attestations
          # that PyPI surfaces on the project page (verifiable via `pypa/gh-action-pypi-publish`).
          packages-dir: dist/
          skip-existing: true
          attestations: true

  github-release:
    name: Attach to GitHub Release (Sigstore-signed)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to create the release
      id-token: write   # for Sigstore keyless OIDC signing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Generate SBOM
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python scripts/generate_sbom.py --out sbom.cdx.json
          echo "SBOM: $(wc -l < sbom.cdx.json) lines"

      - name: Sign artifacts with Sigstore (keyless)
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          # Signs each file → emits .sigstore bundle (transparency log entry,
          # certificate, signature) verifiable via `sigstore verify identity`.
          # Uses the workflow's OIDC identity — no long-lived signing keys.
          inputs: |
            ./dist/*.whl
            ./dist/*.tar.gz
            sbom.cdx.json
          release-signing-artifacts: false   # we attach manually below

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            sbom.cdx.json
            *.sigstore
            *.sigstore.json
