name: Finance Pro
description: Conservative financial presentation colors — navy, dark green for positive, red for negative, tabular-friendly typography
version: "1.0"

colors:
  navy_900: "#0C1B33"
  navy_800: "#152642"
  navy_700: "#1E3A5F"
  steel_gray: "#4A5568"
  light_gray: "#EDF2F7"
  white: "#FFFFFF"
  off_white: "#F7FAFC"
  dark_text: "#1A202C"
  medium_text: "#2D3748"
  muted_text: "#718096"
  money_green: "#0D6B3D"
  loss_red: "#C53030"
  caution_amber: "#B7791F"

palette:
  primary: "$colors.navy_900"
  secondary: "$colors.navy_700"
  accent: "$colors.money_green"
  background: "$colors.white"
  surface: "$colors.off_white"
  text_primary: "$colors.dark_text"
  text_secondary: "$colors.medium_text"
  text_muted: "$colors.muted_text"
  positive: "$colors.money_green"
  negative: "$colors.loss_red"
  warning: "$colors.caution_amber"

typography:
  heading_family: Arial
  body_family: Calibri
  mono_family: Consolas
  scale:
    h1: 40
    h2: 32
    h3: 26
    subtitle: 20
    body: 16
    caption: 12
    footnote: 9
  weights:
    heading: 700
    subtitle: 600
    body: 400
    caption: 400
  line_height: 1.3

spacing:
  margin_top: 0.4
  margin_bottom: 0.4
  margin_left: 0.6
  margin_right: 0.6
  gutter: 0.25
  element_gap: 0.15
  section_gap: 0.4

slide_masters:
  title_slide:
    background: "$colors.navy_900"
    regions:
      title:
        font_family: Arial
        font_size: 40
        font_weight: 700
        color: "$colors.white"
        alignment: center
      subtitle:
        font_family: Calibri
        font_size: 20
        color: "$colors.light_gray"
        alignment: center
  bullet_points:
    background: "$palette.background"
    regions:
      title:
        font_family: Arial
        font_size: 32
        font_weight: 700
        color: "$colors.navy_900"
      bullets:
        font_family: Calibri
        font_size: 16
        color: "$colors.medium_text"
        bullet_color: "$colors.navy_700"
        indent: 0.4
  two_column_text:
    background: "$palette.background"
    regions:
      title:
        font_family: Arial
        font_size: 32
        font_weight: 700
        color: "$colors.navy_900"
      left_column:
        font_family: Calibri
        font_size: 16
        color: "$colors.medium_text"
      right_column:
        font_family: Calibri
        font_size: 16
        color: "$colors.medium_text"
  chart_slide:
    background: "$palette.background"
    regions:
      title:
        font_family: Arial
        font_size: 32
        font_weight: 700
        color: "$colors.navy_900"
      chart_area:
        background: "$colors.off_white"
        min_height: 4.5
  table_slide:
    background: "$palette.background"
    regions:
      title:
        font_family: Arial
        font_size: 32
        font_weight: 700
        color: "$colors.navy_900"
      table_area:
        font_family: Calibri
        font_size: 12
        color: "$colors.dark_text"
        background: "$colors.off_white"
  section_divider:
    background: "$colors.navy_800"
    regions:
      title:
        font_family: Arial
        font_size: 40
        font_weight: 700
        color: "$colors.white"
        alignment: center
  quote_slide:
    background: "$colors.off_white"
    regions:
      quote:
        font_family: Arial
        font_size: 26
        color: "$colors.navy_900"
        alignment: center
      attribution:
        font_family: Calibri
        font_size: 14
        color: "$colors.muted_text"
        alignment: center
  image_with_caption:
    background: "$palette.background"
    regions:
      title:
        font_family: Arial
        font_size: 32
        font_weight: 700
        color: "$colors.navy_900"
      caption:
        font_family: Calibri
        font_size: 12
        color: "$colors.muted_text"
  stats_callout:
    background: "$palette.background"
    regions:
      number:
        font_family: Arial
        font_size: 56
        font_weight: 700
        color: "$colors.navy_900"
        alignment: center
      label:
        font_family: Calibri
        font_size: 16
        color: "$colors.medium_text"
        alignment: center
  thank_you:
    background: "$colors.navy_900"
    regions:
      title:
        font_family: Arial
        font_size: 40
        font_weight: 700
        color: "$colors.white"
        alignment: center

chart_colors:
  - "$colors.navy_700"
  - "$colors.money_green"
  - "$colors.caution_amber"
  - "$colors.loss_red"
  - "$colors.steel_gray"
  - "#6366F1"

logo:
  max_width: 1.0
  max_height: 0.5
  placement: top_right
  opacity: 1.0

_protected:
  - spacing
  - typography.scale
  - typography.line_height
