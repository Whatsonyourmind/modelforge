name: Forest Green
description: Deep greens with natural palette and warm complement colors — organic and grounded
version: "1.0"

colors:
  forest_900: "#052E16"
  forest_800: "#14532D"
  forest_700: "#15803D"
  sage: "#A3B18A"
  cream: "#FEFDF5"
  warm_white: "#FAFAF5"
  sand: "#E8E0D0"
  dark_text: "#1C1917"
  medium_text: "#44403C"
  muted_text: "#78716C"
  red_700: "#B91C1C"
  amber_700: "#B45309"

palette:
  primary: "$colors.forest_700"
  secondary: "$colors.sage"
  accent: "$colors.forest_700"
  background: "$colors.warm_white"
  surface: "$colors.cream"
  text_primary: "$colors.dark_text"
  text_secondary: "$colors.medium_text"
  text_muted: "$colors.muted_text"
  positive: "$colors.forest_700"
  negative: "$colors.red_700"
  warning: "$colors.amber_700"

typography:
  heading_family: Playfair Display
  body_family: Lato
  mono_family: Source Code Pro
  scale:
    h1: 42
    h2: 34
    h3: 26
    subtitle: 22
    body: 18
    caption: 14
    footnote: 10
  weights:
    heading: 700
    subtitle: 600
    body: 400
    caption: 400
  line_height: 1.5

spacing:
  margin_top: 0.55
  margin_bottom: 0.55
  margin_left: 0.8
  margin_right: 0.8
  gutter: 0.3
  element_gap: 0.25
  section_gap: 0.55

slide_masters:
  title_slide:
    background: "$colors.forest_900"
    regions:
      title:
        font_family: Playfair Display
        font_size: 42
        font_weight: 700
        color: "$colors.warm_white"
        alignment: center
      subtitle:
        font_family: Lato
        font_size: 22
        color: "$colors.sage"
        alignment: center
  bullet_points:
    background: "$palette.background"
    regions:
      title:
        font_family: Playfair Display
        font_size: 34
        font_weight: 700
        color: "$colors.dark_text"
      bullets:
        font_family: Lato
        font_size: 18
        color: "$colors.medium_text"
        bullet_color: "$colors.forest_700"
        indent: 0.5
  two_column_text:
    background: "$palette.background"
    regions:
      title:
        font_family: Playfair Display
        font_size: 34
        font_weight: 700
        color: "$colors.dark_text"
      left_column:
        font_family: Lato
        font_size: 18
        color: "$colors.medium_text"
      right_column:
        font_family: Lato
        font_size: 18
        color: "$colors.medium_text"
  chart_slide:
    background: "$palette.background"
    regions:
      title:
        font_family: Playfair Display
        font_size: 34
        font_weight: 700
        color: "$colors.dark_text"
      chart_area:
        background: "$colors.cream"
        min_height: 4.5
  table_slide:
    background: "$palette.background"
    regions:
      title:
        font_family: Playfair Display
        font_size: 34
        font_weight: 700
        color: "$colors.dark_text"
      table_area:
        font_family: Lato
        font_size: 14
        color: "$colors.dark_text"
  section_divider:
    background: "$colors.forest_800"
    regions:
      title:
        font_family: Playfair Display
        font_size: 42
        font_weight: 700
        color: "$colors.warm_white"
        alignment: center
  quote_slide:
    background: "$colors.cream"
    regions:
      quote:
        font_family: Playfair Display
        font_size: 28
        color: "$colors.forest_900"
        alignment: center
      attribution:
        font_family: Lato
        font_size: 16
        color: "$colors.muted_text"
        alignment: center
  image_with_caption:
    background: "$palette.background"
    regions:
      title:
        font_family: Playfair Display
        font_size: 34
        font_weight: 700
        color: "$colors.dark_text"
      caption:
        font_family: Lato
        font_size: 14
        color: "$colors.muted_text"
  stats_callout:
    background: "$palette.background"
    regions:
      number:
        font_family: Playfair Display
        font_size: 56
        font_weight: 700
        color: "$colors.forest_700"
        alignment: center
      label:
        font_family: Lato
        font_size: 18
        color: "$colors.medium_text"
        alignment: center
  thank_you:
    background: "$colors.forest_900"
    regions:
      title:
        font_family: Playfair Display
        font_size: 42
        font_weight: 700
        color: "$colors.warm_white"
        alignment: center

chart_colors:
  - "$colors.forest_700"
  - "$colors.sage"
  - "$colors.amber_700"
  - "#7C3AED"
  - "#0891B2"
  - "#DB2777"

logo:
  max_width: 1.0
  max_height: 0.5
  placement: top_left
  opacity: 1.0

_protected:
  - spacing
  - typography.scale
  - typography.line_height
