          { id: A-030, name: sofr_rate, label: { en: "SOFR (reference)", it: "SOFR (riferimento)" }, unit: pct, base: 0.0400, rationale: "Frozen benchmark input per brief BM-LBO-001.", confidence: H, source_id: S-001 }
      amount:
        { id: A-031, name: senior_tl_amount, label: { en: "Senior Term Loan amount", it: "Importo Term Loan Senior" }, unit: eur_m, base: 157.5, rationale: "4.5x entry EBITDA of 35.0 per brief BM-LBO-001.", confidence: H, source_id: S-001 }
      margin_bps:
        { id: A-032, name: senior_tl_margin_bps, label: { en: "Senior margin (bps)", it: "Margine senior (bps)" }, unit: bps, base: 350, rationale: "Frozen benchmark input per brief BM-LBO-001 (all-in 7.50%).", confidence: H, source_id: S-001 }
