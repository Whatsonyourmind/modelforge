target_share_price_eur: 4.40
option_buyout_eur_m: 0.0
target_net_debt_close_eur_m: 20.0

# Transaction fees
ma_advisory_fees_eur_m: 7.0
financing_fees_eur_m: 5.0

# Capital structure: sponsor equity = balancing plug
#   uses  = 330.0 equity PP + 20.0 net-debt refi + 7.0 M&A + 5.0 financing
#           + 5.0 minimum cash = 367.0
#   debt  = 157.5 senior + 35.0 mezz = 192.5
#   plug  = 367.0 - 192.5 - 0.0 rollover = 174.5  (per brief)
sponsor_equity_eur_m:
  { id: A-210, name: sponsor_equity_eur_m, label: { en: "Sponsor equity (new money)", it: "Equity sponsor" }, unit: eur_m, base: 174.5, rationale: "Balancing plug: total uses 367.0 minus debt 192.5 minus rollover 0.0, per brief BM-LBO-001.", confidence: H, source_id: S-001 }
mgmt_rollover_eur_m: 0.0
mip_pool_pct: 0.0
mip_vesting_years: 4

# No dividend recap, no earnout (per brief)
div_recap_enabled: false
earnout_fair_value_eur_m: 0.0

# Exit: strategic sale at 9.0x EV/EBITDA on PROJECTED year-5 EBITDA.
# IPO / secondary rows are engine display extras — the benchmark headline is
# the STRATEGIC scenario only (per brief).
exit_strategic_multiple: 9.0
exit_ipo_multiple: 14.0
exit_secondary_multiple: 8.0
exit_year: 5

# Hurdle / promote — engine defaults (display only, not benchmark headlines)
hurdle_irr_pcts: [0.20, 0.25, 0.30]
gp_pref_pct: 0.08
gp_catchup_pct: 1.0
gp_carry_pct: 0.20
