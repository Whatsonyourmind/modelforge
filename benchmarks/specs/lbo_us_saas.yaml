# Purchase price build: offer $4.40 x (1 + 25%) = $5.50/share x 60.0m FD
# shares = 330.0 equity purchase price; + 20.0 net debt = 350.0 entry EV
# = 10.0x entry EBITDA of 35.0 (per brief).
offer_premium_pct:
  { id: A-201, name: offer_premium_pct, label: { en: "Offer premium", it: "Premio sull'offerta" }, unit: pct, base: 0.25, rationale: "Frozen benchmark input per brief BM-LBO-001.", confidence: H, source_id: S-001 }
